name: Preprocessing Workflow

on:
  push:
    paths:
      - 'Eksperimen_SML_Yandiyan/preprocessing/**'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Preprocessing Script
        run: |
          cd Eksperimen_SML_Yandiyan/preprocessing
          python automate_Yandiyan.py

      - name: Upload Cleaned Dataset as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-dataset
          path: Eksperimen_SML_Yandiyan/preprocessing/loan_prediction_preprocessing/loan_cleaned.csv
